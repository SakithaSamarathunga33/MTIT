server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/student/**, /api/student
          filters:
            - RewritePath=/api/student(?<segment>/?.*), /student$\{segment}

        - id: enrollment-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/enrollement/**, /api/enrollement
          filters:
            - RewritePath=/api/enrollement(?<segment>/?.*), /enrollment$\{segment}

        - id: lecture-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/lecture/**, /api/lecture
          filters:
            - RewritePath=/api/lecture(?<segment>/?.*), /lecture$\{segment}

        - id: course-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/course/**, /api/course
          filters:
            - RewritePath=/api/course(?<segment>/?.*), /course$\{segment}

